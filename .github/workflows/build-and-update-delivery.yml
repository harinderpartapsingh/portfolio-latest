name: Build Image and Update Delivery Repo

on:
  push:
    branches:
      - main

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: harinderpartapsingh
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build image
        run: |
          docker build \
            --platform linux/amd64 \
            -t ghcr.io/harinderpartapsingh/portfolio-latest:${{ steps.vars.outputs.TAG }} \
            .

      - name: Push image
        run: |
          docker push ghcr.io/harinderpartapsingh/portfolio-latest:${{ steps.vars.outputs.TAG }}

      - name: Checkout delivery repo
        uses: actions/checkout@v4
        with:
          repository: harinderpartapsingh/homeserver-deployments
          token: ${{ secrets.DELIVERY_REPO_TOKEN }}
          path: delivery-repo

      - name: Update image tag in delivery compose
        run: |
          cd delivery-repo
          sed -i 's|ghcr.io/.*portfolio-.*:.*|ghcr.io/harinderpartapsingh/portfolio-latest:${{ steps.vars.outputs.TAG }}|g' docker-compose.yml

      - name: Commit and push delivery repo
        run: |
          cd delivery-repo
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docker-compose.yml
          git commit -m "Deploy portfolio-latest image ${{ steps.vars.outputs.TAG }}" || echo "No changes"
          git push